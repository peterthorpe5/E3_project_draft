# Copy this file for each immutable production run and replace every CHANGE_ME value.
schema_version: 1
run:
  name: CHANGE_ME_run_id
  mode: production
  project_root: /home/pthorpe001/data/2026_E3_protac/E3_project_draft
  output_root: /home/pthorpe001/data/2026_E3_protac/analysis/e3_end_to_end_runs
inputs:
  proteomes_manifest: /CHANGE_ME/proteomes.tsv
  seeds_manifest: ../data/known_e3_seed_evidence.tsv.gz
  shortlist_manifest: /CHANGE_ME/approved_ligandability_shortlist.tsv
benchmarking:
  # Process-tree samples are retained as gzip-compressed TSV. Five seconds keeps multi-day runs
  # detailed without creating excessively large monitoring tables.
  sample_interval_seconds: 5.0
  collect_slurm_accounting: true
reporting:
  # HTML previews are bounded. Complete TSV/Parquet/database authorities remain separate outputs.
  preview_rows: 10
  max_table_columns: 12
  max_chart_items: 20
stages:
  00_inputs:
    enabled: true
    required: true
    expected_outputs: [input_validation.tsv]
    threads: 1
    memory_mb: 4000
    runtime_minutes: 30
  01_prepared_proteomes:
    enabled: true
    required: true
    command: ["CHANGE_ME_PREPARATION_EXECUTABLE", "--output-dir", "{stage_dir}"]
    expected_outputs: ["prepared_proteomes.tsv"]
    threads: 1
    memory_mb: 8000
    runtime_minutes: 60
  02_discovery:
    enabled: true
    required: true
    command: ["CHANGE_ME_DISCOVERY_EXECUTABLE", "--output-dir", "{stage_dir}", "--threads", "{threads}"]
    expected_outputs: ["duckdb/e3_discovery_resource.duckdb"]
    threads: 4
    memory_mb: 64000
    runtime_minutes: 1440
  03_candidate_evidence:
    enabled: true
    required: true
    command: ["CHANGE_ME_CANDIDATE_EXECUTABLE", "--output-dir", "{stage_dir}"]
    expected_outputs: ["candidate_evidence/e3_cluster_candidate_evidence.parquet"]
    threads: 1
    memory_mb: 16000
    runtime_minutes: 120
  04_orthofinder:
    enabled: true
    required: true
    # The preparation adapter must publish one complete, primary-protein FASTA per species under
    # 01_prepared_proteomes/proteomes. OrthoFinder 2.5.5 is installed by environment.yml.
    command:
      - "orthofinder"
      - "-f"
      - "{run_root}/01_prepared_proteomes/proteomes"
      - "-o"
      - "{stage_dir}/Results"
      - "-t"
      - "{threads}"
      - "-a"
      - "{threads}"
    expected_outputs:
      - "Results/Log.txt"
      - "Results/WorkingDirectory/SpeciesIDs.txt"
      - "Results/WorkingDirectory/SequenceIDs.txt"
      - "Results/Orthogroups/Orthogroups.tsv"
      - "Results/Phylogenetic_Hierarchical_Orthogroups/N0.tsv"
      - "Results/Species_Tree/SpeciesTree_rooted_node_labels.txt"
    threads: 4
    memory_mb: 64000
    runtime_minutes: 1440
  05_orthology:
    enabled: true
    required: true
    command: ["CHANGE_ME_ORTHOLOGY_EXECUTABLE", "--output-dir", "{stage_dir}", "--threads", "{threads}"]
    expected_outputs: ["tables/orthogroup_membership.parquet"]
    threads: 4
    memory_mb: 16000
    runtime_minutes: 240
  06_domains:
    enabled: true
    required: true
    command: ["CHANGE_ME_DOMAIN_EXECUTABLE", "--output-dir", "{stage_dir}", "--threads", "{threads}"]
    expected_outputs: ["tables/domain_evidence.parquet"]
    threads: 4
    memory_mb: 32000
    runtime_minutes: 720
  07_expression:
    enabled: true
    required: true
    command: ["CHANGE_ME_EXPRESSION_EXECUTABLE", "--output-dir", "{stage_dir}", "--threads", "{threads}"]
    expected_outputs: ["e3_expression.duckdb"]
    threads: 4
    memory_mb: 16000
    runtime_minutes: 720
  08_shortlist_gate:
    enabled: true
    required: true
    expected_outputs: ["approved_accessions.tsv"]
    threads: 1
    memory_mb: 4000
    runtime_minutes: 30
  09_ligandability:
    enabled: true
    required: true
    command: ["CHANGE_ME_LIGANDABILITY_EXECUTABLE", "--output-dir", "{stage_dir}", "--threads", "{threads}"]
    expected_outputs: ["duckdb/e3_ligandability.duckdb"]
    threads: 4
    memory_mb: 64000
    runtime_minutes: 2880
  10_integrated_resource:
    enabled: true
    required: true
    command: ["CHANGE_ME_INTEGRATION_EXECUTABLE", "--output-dir", "{stage_dir}", "--threads", "{threads}"]
    expected_outputs: ["duckdb/e3_integrated_resource.duckdb"]
    threads: 4
    memory_mb: 32000
    runtime_minutes: 240
  11_app_ready:
    enabled: true
    required: true
    expected_outputs: ["app_handoff.tsv"]
    threads: 1
    memory_mb: 4000
    runtime_minutes: 30
