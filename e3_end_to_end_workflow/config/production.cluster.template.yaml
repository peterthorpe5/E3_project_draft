# Flexible fresh-production template for a larger proteome/species panel.
# Commands are argv lists. Replace each CHANGE_ME value with the reviewed component adapter.
schema_version: 1
run:
  name: CHANGE_ME_large_fresh_run_id
  mode: production
  project_root: /home/pthorpe001/data/2026_E3_protac/E3_project_draft
  output_root: /home/pthorpe001/data/2026_E3_protac/analysis/e3_end_to_end_runs
inputs:
  proteomes_manifest: /CHANGE_ME/proteomes.tsv
  seeds_manifest: ../data/known_e3_seed_evidence.tsv.gz
  shortlist_manifest: /CHANGE_ME/not_used_by_computational_gate/shortlist.tsv
  orthology_species_manifest: /CHANGE_ME/species_manifest.tsv
  inherited_sqlite: /CHANGE_ME/e3_ligase_sqlite_db.db
  expression_manifest: /CHANGE_ME/e3_workflow_expression_resources.tsv
  ligandability_manifest: /CHANGE_ME/optional_reusable_ligandability_resources.tsv
  domain_annotation_manifest: ""
  domain_cache_root: /CHANGE_ME/shared_interpro_cache
  e3_domain_catalogue: ../data/e3_domain_catalogue.tsv
analysis:
  domains:
    mode: interpro_api_cache
    interpro_api_base_url: https://www.ebi.ac.uk/interpro/api
    allow_network: true
    workers: 16
    request_timeout_seconds: 60
    max_retries: 4
    retry_delay_seconds: 2
  expression:
    minimum_expression_value: 0.0
    broad_positive_fraction: 0.5
  ligandability:
    # Set reuse_only when stage 09 uses the internal reusable-evidence adapter. A fresh stage-09
    # external command must publish the same standard tables declared below.
    mode: reuse_only
    mafft_executable: mafft
    minimum_druggability_score: 0.5
    minimum_mapping_fraction: 0.95
    minimum_pocket_plddt_fraction: 0.7
    minimum_region_overlap: 0.25
  structural_alignment:
    usalign_executable: USalign
    tmalign_executable: TMalign
    distance_threshold_angstrom: 4.0
    maximum_centroid_distance_angstrom: 8.0
    minimum_pocket_overlap_fraction: 0.5
    minimum_global_tm_score: 0.5
    minimum_structural_residue_match_fraction: 0.5
    minimum_structural_chemical_group_conservation: 0.6
    minimum_group_support_fraction: 0.75
    use_for_prioritisation: false
    prioritisation_weight: 0.25
  prioritisation:
    profile_name: CHANGE_ME_versioned_scoring_profile
    target_species: [CHANGE_ME_species_1, CHANGE_ME_species_2]
    mandatory_species: [CHANGE_ME_species_1]
    minimum_target_species_fraction: 0.9
    minimum_expression_species_fraction: 0.8
    minimum_domain_species_fraction: 0.8
    structure_group_limit: 100
    final_candidate_limit: 20
    discovery_weight: 0.10
    orthology_weight: 0.35
    domain_weight: 0.20
    expression_weight: 0.35
    ligandability_weight: 0.55
    pocket_conservation_weight: 0.45
    prestructure_final_weight: 0.60
    structural_final_weight: 0.40
    minimum_structural_species_fraction: 0.75
benchmarking:
  sample_interval_seconds: 5.0
  collect_slurm_accounting: true
reporting:
  preview_rows: 15
  max_table_columns: 16
  max_chart_items: 25
stages:
  00_inputs:
    enabled: true
    required: true
    evidence_mode: validate
    expected_outputs: [input_validation.tsv]
    threads: 1
    memory_mb: 8000
    runtime_minutes: 120
  01_prepared_proteomes:
    enabled: true
    required: true
    evidence_mode: prepare
    expected_outputs: [prepared_proteomes.tsv]
    threads: 4
    memory_mb: 32000
    runtime_minutes: 360
  02_discovery:
    enabled: true
    required: true
    evidence_mode: generate
    command:
      - CHANGE_ME_DISCOVERY_ADAPTER
      - --proteomes-manifest
      - "{proteomes_manifest}"
      - --seeds-manifest
      - "{seeds_manifest}"
      - --output-dir
      - "{stage_dir}"
      - --threads
      - "{threads}"
    expected_outputs: [duckdb/e3_discovery_resource.duckdb]
    threads: 32
    memory_mb: 180000
    runtime_minutes: 10080
  03_candidate_evidence:
    enabled: true
    required: true
    evidence_mode: generate
    command:
      - CHANGE_ME_CANDIDATE_EVIDENCE_ADAPTER
      - --discovery-stage
      - "{run_root}/02_discovery"
      - --output-dir
      - "{stage_dir}"
    expected_outputs:
      - candidate_evidence/e3_cluster_candidate_evidence.parquet
      - provenance/e3_cluster_candidate_evidence_manifest.json
    threads: 8
    memory_mb: 64000
    runtime_minutes: 1440
  04_orthofinder:
    enabled: true
    required: true
    evidence_mode: generate
    command:
      - orthofinder
      - -f
      - "{run_root}/01_prepared_proteomes/proteomes"
      - -o
      - "{stage_dir}/Results"
      - -t
      - "{threads}"
      - -a
      - "{threads}"
    expected_outputs:
      - Results/Log.txt
      - Results/WorkingDirectory/SpeciesIDs.txt
      - Results/WorkingDirectory/SequenceIDs.txt
      - Results/Orthogroups/Orthogroups.tsv
      - Results/Phylogenetic_Hierarchical_Orthogroups/N0.tsv
      - Results/Species_Tree/SpeciesTree_rooted_node_labels.txt
    threads: 32
    memory_mb: 180000
    runtime_minutes: 10080
  05_orthology:
    enabled: true
    required: true
    evidence_mode: derive
    command:
      - CHANGE_ME_ORTHOLOGY_ADAPTER
      - --orthofinder-results-dir
      - "{run_root}/04_orthofinder/Results"
      - --candidate-evidence
      - "{run_root}/03_candidate_evidence/candidate_evidence/e3_cluster_candidate_evidence.parquet"
      - --species-manifest
      - "{orthology_species_manifest}"
      - --output-dir
      - "{stage_dir}"
      - --threads
      - "{threads}"
    expected_outputs:
      - tables/candidate_membership_mapping.parquet
      - tables/candidate_group_member_sequences.parquet
      - tables/orthogroup_membership.parquet
      - tables/hierarchical_membership.parquet
      - tables/candidate_cluster_orthology_summary.parquet
    threads: 16
    memory_mb: 120000
    runtime_minutes: 2880
  06_domains:
    enabled: true
    required: true
    evidence_mode: download
    expected_outputs:
      - tables/domain_hits.parquet
      - tables/domain_summary.parquet
      - raw/interpro_cache_inventory.tsv
      - qc/domain_validation.tsv
    threads: 16
    memory_mb: 64000
    runtime_minutes: 2880
  07_expression:
    enabled: true
    required: true
    evidence_mode: reuse
    expected_outputs:
      - tables/candidate_identifier_aliases.parquet
      - tables/candidate_expression_mapping.parquet
      - tables/candidate_expression_summary.parquet
      - qc/expression_validation.tsv
    threads: 16
    memory_mb: 120000
    runtime_minutes: 2880
  08_shortlist_gate:
    enabled: true
    required: true
    evidence_mode: derive
    expected_outputs:
      - tables/computational_prestructure_ranking.parquet
      - tables/structural_analysis_accessions.parquet
      - tables/human_review_template.tsv
      - qc/prioritisation_validation.tsv
    threads: 16
    memory_mb: 120000
    runtime_minutes: 1440
  09_ligandability:
    enabled: true
    required: true
    evidence_mode: generate
    command:
      - CHANGE_ME_FRESH_LIGANDABILITY_ADAPTER
      - --accessions
      - "{run_root}/08_shortlist_gate/tables/structural_analysis_accessions.tsv"
      - --output-dir
      - "{stage_dir}"
      - --threads
      - "{threads}"
    expected_outputs:
      - tables/selected_pockets.parquet
      - tables/structural_prediction_status.parquet
      - tables/pocket_conservation_summary.parquet
      - tables/pocket_conservation_members.parquet
      - tables/pocket_sequence_coordinates.parquet
      - qc/ligandability_validation.tsv
    threads: 32
    memory_mb: 180000
    runtime_minutes: 10080
  09b_structural_alignment:
    enabled: false
    required: false
    evidence_mode: disabled
    command:
      - conda
      - run
      - --no-capture-output
      - --name
      - e3_structural_alignment
      - bash
      - "{project_root}/e3_structural_alignment/run_e3_structural_alignment.sh"
      - --selected-pockets
      - "{selected_pockets}"
      - --pocket-residue-mappings
      - "{pocket_residue_mappings}"
      - --pocket-sequence-coordinates
      - "{pocket_sequence_coordinates}"
      - --asset-manifest
      - "{structure_asset_manifest}"
      - --output-dir
      - "{stage_dir}/structural_alignment"
      - --usalign-executable
      - "{usalign_executable}"
      - --tmalign-executable
      - "{tmalign_executable}"
      - --threads
      - "{threads}"
      - --distance-threshold-angstrom
      - "{structural_distance_threshold_angstrom}"
      - --maximum-centroid-distance-angstrom
      - "{structural_maximum_centroid_distance_angstrom}"
      - --minimum-pocket-overlap-fraction
      - "{structural_minimum_pocket_overlap_fraction}"
      - --minimum-global-tm-score
      - "{structural_minimum_global_tm_score}"
      - --minimum-structural-residue-match-fraction
      - "{structural_minimum_residue_match_fraction}"
      - --minimum-structural-chemical-group-conservation
      - "{structural_minimum_chemical_group_conservation}"
      - --minimum-group-support-fraction
      - "{structural_minimum_group_support_fraction}"
      - --resume
    expected_outputs:
      - structural_alignment/tables/structural_alignments.parquet
      - structural_alignment/tables/pocket_comparisons.parquet
      - structural_alignment/tables/pocket_residue_matches.parquet
      - structural_alignment/tables/structural_alignment_summary.parquet
      - structural_alignment/qc/structural_alignment_validation.tsv
      - structural_alignment/reports/structural_alignment_summary.html
      - structural_alignment/interactive/structural_alignment_browser.html
      - structural_alignment/provenance/run_manifest.json
    threads: 32
    memory_mb: 120000
    runtime_minutes: 2880
  10_integrated_resource:
    enabled: true
    required: true
    evidence_mode: derive
    expected_outputs:
      - duckdb/e3_integrated_resource.duckdb
      - tables/final_candidate_prioritisation.parquet
      - tables/e3_candidate_master_results.parquet
      - reports/final_computational_prioritisation.html
      - qc/integrated_resource_validation.tsv
    threads: 16
    memory_mb: 120000
    runtime_minutes: 1440
  11_app_ready:
    enabled: true
    required: true
    evidence_mode: derive
    expected_outputs:
      - app_handoff.tsv
      - app_release_manifest.json
      - config/python_app.env
      - config/python_app_master_parquet.env
      - config/shiny_app.env
      - config/shiny_app_master_parquet.env
      - config/shiny_app_config.tsv
      - config/shiny_app_master_parquet_config.tsv
    threads: 1
    memory_mb: 8000
    runtime_minutes: 120
