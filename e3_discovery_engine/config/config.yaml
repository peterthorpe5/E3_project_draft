project:
  name: e3_milestone1_production
  description: >-
    Identify sequence clusters containing at least one previously identified
    E3 candidate; do not interpret all cluster members as confirmed E3 ligases.

inputs:
  samples_tsv: samples.tsv
  e3_seed_table: ../tests/fixtures/e3_seeds.csv
  e3_seed_column: Entry
  identifier_mode: prefix_sample
  compute_input_checksums: true

outputs:
  root: ../results/example_run

software:
  environment: ../workflow/envs/production.yml

resources:
  threads: 4
  parquet_batch_size: 100000

# DeepClust defines broad sequence clusters. Strict evidence is added later by
# the post-realignment thresholds below.
diamond:
  executable: diamond
  # Optional whitespace-free parent for DIAMOND path aliases.
  # path_alias_root: ../.e3_path_aliases
  identity_mode: exact
  identity_percent: 50
  mutual_cover_percent: 50
  clustering_evalue: 0.1
  comp_based_stats: 0
  memory_limit: 16G
  masking: tantan
  cluster_steps: []
  extra_args: []

thresholds:
  minimum_percent_identity: 50
  minimum_representative_coverage: 50
  minimum_member_coverage: 50
  minimum_bitscore: 20
  maximum_evalue: 1.0e-10

benchmarking:
  repeats: 1
